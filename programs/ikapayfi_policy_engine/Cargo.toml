[package]
name = "ikapayfi_policy_engine"
version = "0.1.0"
description = "IkaPayFi Solana policy engine for encrypted bridgeless payroll and remittance"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "ikapayfi_policy_engine"

[features]
no-entrypoint = []
no-idl = []
cpi = ["no-entrypoint"]
default = []

[dependencies]
anchor-lang = "0.32"
encrypt-types = { git = "https://github.com/dwallet-labs/encrypt-pre-alpha" }
encrypt-dsl = { package = "encrypt-solana-dsl", git = "https://github.com/dwallet-labs/encrypt-pre-alpha" }
encrypt-anchor = { git = "https://github.com/dwallet-labs/encrypt-pre-alpha" }
